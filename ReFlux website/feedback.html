<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback | ReFlux</title>

  <link rel="stylesheet" href="feedbackstyle.css">

  <!-- Firebase -->
  <script type="module" src="feedbackscript.js"></script>

  //protection without signin---------------------------------
  <script>
    const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
        // 💾 save current page
        localStorage.setItem("redirectAfterLogin", window.location.href);

        // 🚀 go to login
        window.location.href = "login.html";
        }
    </script>
    //ends here-------------------------------------------------
</head>

<body>

<!-- 🌌 PARALLAX BG -->
<div class="bg layer1"></div>
<div class="bg layer2"></div>
<div class="bg layer3"></div>

<!-- HEADER -->
<header>
  <h1>ReFlux Feedback</h1>
  <a href="index.html" class="back">Home</a>
</header>

<!-- FORM -->
<div class="container">

  <div class="card">
    <h2>Rate Your Experience</h2>
    <p>Help improve ReFlux 🚀</p>

    <!-- ⭐ STARS -->
    <div class="stars">
      <span data-value="1">★</span>
      <span data-value="2">★</span>
      <span data-value="3">★</span>
      <span data-value="4">★</span>
      <span data-value="5">★</span>
    </div>

    <textarea id="feedbackText" placeholder="Write your feedback..."></textarea>

    <button id="submitBtn">Submit Feedback</button>

    <p id="result"></p>
  </div>

</div>

</body>
</html>
