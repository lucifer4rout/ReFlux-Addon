<!-- protection without signin -->
  <script>
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
      // 💾 save current page
      localStorage.setItem("redirectAfterLogin", window.location.href);

      // 🚀 go to login
      window.location.href = "login.html";
    }
  </script>
<!-- ends here -->

<!-- BACKGROUND DOTS -->
<div id="dots"></div>

<!-- HEADER -->
<header>
  
<div class="logo-container">
  
  <a href="index.html" class="logo-icon">
    <img src="assets/logo.png" alt="ReFlux Logo">
  </a>

    <b>R</b><span id="logo-text"></span>Flux
  </h1>

</div>

  <button class="menu-toggle" onclick="toggleMenu(this)">

<!-- SCROLL REVEAL SECTION -->
<div style="text-align:center; color:white; padding:100px 20px;">
  <form id="ticketForm" class="ticket-form">
    <select id="category">
      <option value="bug">Bug</option>
      <option value="payment">Payment Issue</option>
      <option value="feature">Feature Request</option>
      <option value="other">Other</option>
    </select>
    <input type="text" id="title" placeholder="Use" required>
    <input type="text" id="title" placeholder="Issue Title" required>

    <textarea id="description" placeholder="Describe your issue..." required></textarea>

    <select id="priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <button type="submit" class="btn primary">Submit Ticket</button>

  </form>

<div class="end reveal">
