<!DOCTYPE html>
<html>
<head>
  <title>Test Tickets</title>
</head>
<body style="background:black;color:white;">

<h1>TEST PAGE</h1>
<div id="ticketList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

console.log("🚀 SCRIPT RUNNING");

const firebaseConfig = {
  apiKey: "AIzaSyDXV7NvAwwKcZioIKfQMZLSRzAFGsDpO-s",
  authDomain: "reflux-4e31c.firebaseapp.com",
  databaseURL: "https://reflux-4e31c-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "reflux-4e31c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("ticketList");

const ticketsRef = ref(db, "tickets");

onValue(ticketsRef, (snapshot) => {
  console.log("📦 DATA:", snapshot.val());

  const data = snapshot.val();

  if (!data) {
    list.innerHTML = "No data";
    return;
  }

  Object.values(data).forEach(ticket => {
    const div = document.createElement("div");
    div.innerHTML = `
      <hr>
      <b>${ticket.title}</b><br>
      ${ticket.description}<br>
      ${ticket.userEmail}
    `;
    list.appendChild(div);
  });
});
</script>

</body>
</html>
