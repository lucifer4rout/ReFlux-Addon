<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReFlux | My Tickets</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <!-- Route Protection (No User = Redirect) -->
  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) {
      localStorage.setItem("redirectAfterLogin", window.location.href);
      window.location.href = "login.html";
    }
  </script>

  <style>
    /* ========== COMBINED STYLES (ticketstyle.css, auth.css, layout.css) ========== */
    body {
      cursor: crosshair;
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
    }

    /* Background dots */
    #dots {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .dot {
      position: absolute;
      top: -10px;
      width: 5px;
      height: 5px;
      background: #fff;
      border-radius: 50%;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh); }
    }

    /* Header & Navigation */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      z-index: 1000;
      box-sizing: border-box;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon img {
      width: 50px;
      height: 50px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .logo-icon img:hover {
      transform: scale(1.15) rotate(-5deg);
    }
    
    #logo {
      display: inline-block;
      cursor: crosshair;
      color: #ffffffb8;
      margin: 0;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), text-shadow 0.6s cubic-bezier(0.22, 1, 0.36, 1), color 0.6s ease;
    }
    #logo:hover {
      transform: translateY(-2px) scale(1.03);
      color: #ffffff;
      text-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    nav {
      display: flex;
      gap: 25px;
      align-items: center;
      position: relative;
      flex-wrap: nowrap;
    }
    nav a {
      color: #bdbdbd;
      text-decoration: none;
      font-size: 15px;
      white-space: nowrap;
      position: relative;
      transition: 0.3s;
    }
    nav a:hover {
      color: #fff;
      transform: translateY(-2px);
    }
    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 2px;
      background: white;
      transition: 0.3s;
    }
    nav a:hover::after { width: 100%; }

    /* Mobile Menu Toggle */
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 2000;
    }
    .menu-toggle span {
      width: 28px;
      height: 3px;
      background: white;
      border-radius: 5px;
      transition: 0.3s;
    }
    .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .menu-toggle.active span:nth-child(2) { opacity: 0; }
    .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(6px,-6px); }

    /* Buttons */
    .btn {
      padding: 16px 50px;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
      display: inline-block;
      font-weight: bold;
    }
    .btn.primary { background: white; color: black; }
    .btn.primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 25px rgba(255,255,255,0.15);
    }

    /* Auth & Profile UI */
    .profile-menu {
      position: relative;
      display: inline-block;
      color: white;
    }
    .profile-btn {
      cursor: pointer;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 40px;
      background: rgba(0,0,0,0.9);
      border-radius: 8px;
      min-width: 120px;
      padding: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .dropdown a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 8px;
      border-radius: 4px;
    }
    .dropdown a:hover { background: rgba(255,255,255,0.1); }
    .profile-menu:hover .dropdown { display: block; }

    .donate-glow {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: 0.35s ease;
      text-shadow: 0 0 6px #6c5ce7, 0 0 14px #6c5ce7, 0 0 28px #6c5ce7;
    }
    .donate-glow:hover {
      text-shadow: 0 0 6px #00d2ff, 0 0 14px #00d2ff, 0 0 28px #00d2ff;
    }

    /* Tickets Section */
    .ticket-list-container {
      text-align: center;
      color: white;
      padding: 120px 20px 40px 20px;
      min-height: 50vh;
    }
    .ticket-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      margin: 15px auto;
      max-width: 600px;
      color: white;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s;
    }
    .ticket-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.12);
    }
    .ticket-card h3 {
      margin: 0 0 10px;
      color: #00d2ff;
    }
    .ticket-meta {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 10px;
    }

    /* Footer Elements */
    .end {
      text-align: center;
      color: white;
      padding: 60px 20px;
    }
    .end h2 { font-size: 36px; margin-bottom: 25px; }
    .hero-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 40px 20px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      color: white;
    }
    .footer-left { display: flex; flex-direction: column; gap: 8px; }
    .footer-brand { display: flex; align-items: center; gap: 10px; }
    .footer-brand img { width: 32px; height: 32px; transition: transform 0.3s ease; }
    .footer-brand img:hover { transform: scale(1.1) rotate(-5deg); }
    .footer-brand h3 { margin: 0; font-size: 22px; }
    .footer-left p { margin: 0; font-size: 14px; color: rgba(255,255,255,0.6); }
    .footer-links { display: flex; gap: 20px; flex-wrap: wrap; }
    .footer-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: 0.3s; }
    .footer-links a:hover { color: white; }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .menu-toggle { display: flex; }
      nav {
        position: fixed;
        top: 0;
        right: -100%;
        height: 100vh;
        width: 240px;
        background: rgba(0,0,0,0.95);
        flex-direction: column;
        padding: 80px 20px;
        gap: 20px;
        transition: right 0.4s ease;
        z-index: 1500;
      }
      nav.active { right: 0; }
      .footer { flex-direction: column; text-align: center; gap: 20px; }
      .footer-brand { justify-content: center; }
    }
  </style>
</head>
<body>

<!-- BACKGROUND DOTS -->
<div id="dots"></div>

<!-- HEADER -->
<header>
  <div class="logo-container">
    <a href="index.html" class="logo-icon">
      <!-- Fallback empty div if logo is missing to prevent broken image icon -->
      <img src="assets/logo.png" alt="ReFlux Logo" onerror="this.style.display='none'">
    </a>
    <h1 id="logo"><b>R</b><span id="logo-text"></span>Flux</h1>
  </div>

  <button class="menu-toggle" onclick="toggleMenu(this)">
    <span></span><span></span><span></span>
  </button>

  <nav id="nav">
    <a href="index.html">Home</a>
    <a href="ticket.html">Submit a Ticket</a>
    <a href="features.html">Features</a>
    <a href="donate.html" class="donate-glow">Donate❤️</a>
    <a href="login.html" id="signin-link">SIGNIN</a>
  </nav>
</header>

<!-- MAIN CONTENT -->
<div class="ticket-list-container">
  <div class="ticket-list" id="ticketList">
    <h2 style="color:white;text-align:center;">My Tickets</h2>
    <p id="loading-text" style="color: gray;">Loading your tickets...</p>
  </div>
</div>

<div class="end reveal active">
  <h2>Get in contact on Discord</h2>
  <div class="hero-buttons">
    <a href="https://discord.com/channels/1490442556591444270/1492560088345608356" class="btn primary" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-discord"></i> Discord
    </a>
  </div>
</div>

<footer class="footer">
  <div class="footer-left">
    <div class="footer-brand">
      <img src="assets/logo.png" alt="ReFlux" onerror="this.style.display='none'">
      <h3>ReFlux</h3>
    </div>
    <p>reflux.addon.support@gmail.com</p>
  </div>
  <div class="footer-links">
    <a href="#">Terms & Conditions</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Feedback</a>
  </div>
</footer>

<!-- UI AND AUTH SCRIPT -->
<script>
  // Mobile Menu Toggle
  function toggleMenu(btn) {
    btn.classList.toggle("active");
    document.getElementById("nav").classList.toggle("active");
  }

  // Load User Info into Navbar
  function loadUserUI() {
    const userData = JSON.parse(localStorage.getItem("user")) || null;
    const signinLink = document.getElementById("signin-link");

    if (userData && signinLink) {
      // Create user avatar/initials
      const photoHtml = userData.photo 
        ? `<img src="${userData.photo}" style="width:25px;height:25px;border-radius:50%;object-fit:cover;">`
        : `<i class="fa-solid fa-user-circle"></i>`;
      
      const userName = userData.name || userData.email || "User";

      signinLink.outerHTML = `
        <div class="profile-menu">
          <div class="profile-btn">
            ${photoHtml}
            <span>${userName}</span>
          </div>
          <div class="dropdown">
            <a href="#">Profile</a>
            <a href="#" onclick="logoutUser()">Logout</a>
          </div>
        </div>
      `;
    }
  }

  function logoutUser() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }

  window.addEventListener("DOMContentLoaded", loadUserUI);

  // Background dots logic
  function createDot() {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.left = Math.random() * 100 + 'vw';
    dot.style.animationDuration = Math.random() * 3 + 2 + 's'; // 2-5s fall
    document.getElementById('dots').appendChild(dot);
    setTimeout(() => dot.remove(), 5000);
  }
  setInterval(createDot, 400);
</script>

<!-- FIREBASE SCRIPT (MODULE) -->
<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  document.addEventListener("DOMContentLoaded", () => {
    console.log("✅ Tickets script running");

    const firebaseConfig = {
      apiKey: "AIzaSyDXV7NvAwwKcZioIKfQMZLSRzAFGsDpO-s",
      authDomain: "reflux-4e31c.firebaseapp.com",
      databaseURL: "https://reflux-4e31c-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "reflux-4e31c"
    };

    // Initialize Firebase safely
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const currentUser = JSON.parse(localStorage.getItem("user")) || {};
    const list = document.getElementById("ticketList");

    // Failsafe checks
    if (!currentUser.email) {
      list.innerHTML = `
        <h2 style='color:white;text-align:center;'>My Tickets</h2>
        <p style='color:#ffaa00;text-align:center;background:rgba(255,170,0,0.1);padding:15px;border-radius:8px;'>
           <i class="fa-solid fa-triangle-exclamation"></i> 
           Login required, or your profile doesn't have an email attached.
        </p>`;
      return;
    }

    const ticketsRef = ref(db, "tickets");

    // Fetch Data (ADDED PROPER ERROR HANDLING)
    onValue(ticketsRef, (snapshot) => {
      console.log("📦 DATA FETCHED");
      const data = snapshot.val();
      
      list.innerHTML = "<h2 style='color:white;text-align:center;'>My Tickets</h2>";

      if (!data) {
        list.innerHTML += "<p style='color:gray;text-align:center;'>No tickets have been created yet.</p>";
        return;
      }

      let found = false;

      Object.values(data).forEach(ticket => {
        // Safe check for email matches
        if (ticket.userEmail && ticket.userEmail.toLowerCase() === currentUser.email.toLowerCase()) {
          found = true;

          const div = document.createElement("div");
          div.className = "ticket-card";
          div.innerHTML = `
            <h3>${ticket.title || "Untitled Ticket"}</h3>
            <p>${ticket.description || "No description provided."}</p>
            <div class="ticket-meta">
              <i class="fa-solid fa-tag"></i> ${ticket.priority || "Normal"} | ${ticket.category || "General"} <br>
              <i class="fa-regular fa-clock" style="margin-top:8px;"></i> ${ticket.createdAt || "Date Unknown"}
            </div>
          `;
          list.appendChild(div);
        }
      });

      if (!found) {
        list.innerHTML += "<p style='color:gray;text-align:center;'>You haven't submitted any tickets yet.</p>";
      }

    }, (error) => {
      // ERROR HANDLER: This is likely why your page was blank!
      console.error("Firebase Read Error:", error);
      list.innerHTML = `
        <h2 style='color:white;text-align:center;'>My Tickets</h2>
        <div style="background:rgba(255,0,0,0.1); border: 1px solid red; color:white; padding:20px; border-radius:8px; max-width: 600px; margin: 0 auto;">
           <h3 style="color: #ff4d4d; margin-top:0;"><i class="fa-solid fa-circle-xmark"></i> Database Access Denied</h3>
           <p><strong>Error message:</strong> ${error.message}</p>
           <p style="font-size: 14px; opacity: 0.8;">
             Developer note: Check your Firebase Realtime Database rules. If they are set to <code>".read": "auth != null"</code>, 
             this query will fail because localStorage is being used for authentication instead of Firebase Auth.
           </p>
        </div>
      `;
    });

  });
</script>

</body>
</html>
