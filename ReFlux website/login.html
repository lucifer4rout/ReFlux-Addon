<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <title>ReFlux | Sign In Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { margin: 0; overflow: hidden; background: black; position: relative; }
        #stars { position: fixed; top: 0; left: 0; z-index: -1; }

        .container {
            background-color: #fff;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 480px;
            margin: 2rem auto;
            z-index: 1;
        }

        .container form { background-color: #fff; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 0 40px; height: 100%; }
        .form-container { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }
        .sign-in { left: 0; width: 50%; z-index: 2; }
        .container.active .sign-in { transform: translateX(100%); }
        .sign-up { left: 0; width: 50%; opacity: 0; z-index: 1; }
        .container.active .sign-up { transform: translateX(100%); opacity: 1; z-index: 5; animation: move 0.6s; }
        
        @keyframes move { 0%, 49.99% { opacity: 0; z-index: 1; } 50%, 100% { opacity: 1; z-index: 5; } }

        .social-icons { margin: 20px 0; display: flex; gap: 10px; }
        .social-icons a {
            border: 1px solid #ddd;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* important */
            width: 240px;
            height: 50px;
            text-decoration: none;
            background: white;
            cursor: pointer;
            gap: 10px;
            padding: 0 15px;
            white-space: nowrap; /* prevents line break */
        }
        .social-icons a:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-color: #4285f4; }
        .social-icons i { font-size: 20px; color: #4285f4; }

        .google-btn {
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* hidden by default */
        .google-btn::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 30px;

            background: linear-gradient(
                45deg,
                red,
                yellow,
                lime,
                cyan,
                blue,
                magenta,
                red
            );

            background-size: 400%;
            z-index: -1;

            opacity: 0;
            transition: opacity 0.6s ease; /* slower fade-in */
        }

        /* inner white layer */
        .google-btn::after {
            position: relative;
            overflow: hidden;
            transition: transform 0.4s ease; /* smooth size change */
            content: "";
            position: absolute;
            inset: 2px;
            background: white;
            border-radius: 25px;
            z-index: -1;
        }

        /* ✨ activate on hover */
        .google-btn:hover::before {
            opacity: 1;
            animation: glow 10s linear infinite; /* was 4s → now slower */
            transform: scale(1.05); /* slightly bigger */
        }

        /* animation */
        @keyframes glow {
            0% { background-position: 0% }
            100% { background-position: 400% }
        }

        #registerBtn {
            pointer-events: none;
            opacity: 0.5;
        }

        .toggle-container {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            overflow: hidden; transition: all 0.6s ease-in-out; border-radius: 150px 0 0 100px; z-index: 1000;
        }
        .container.active .toggle-container { transform: translateX(-100%); border-radius: 0 150px 100px 0; }
        .toggle {
            background: linear-gradient(to right, #5c6bc0, #512da8); color: #fff;
            position: relative; left: -100%; height: 100%; width: 200%;
            transform: translateX(0); transition: all 0.6s ease-in-out;
        }
        .container.active .toggle { transform: translateX(50%); }
        .toggle-panel {
            position: absolute; width: 50%; height: 100%; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
            padding: 0 30px; text-align: center; top: 0; transition: all 0.6s ease-in-out;
        }
        .toggle-left { transform: translateX(-200%); }
        .container.active .toggle-left { transform: translateX(0); }
        .toggle-right { right: 0; }
        .container.active .toggle-right { transform: translateX(200%); }

        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 10px; color: #333; }
        .toggle-panel h1 { color: #fff; }
        .container button {
            background-color: #512da8; color: #fff; font-size: 12px; padding: 10px 45px;
            border: 1px solid transparent; border-radius: 8px; font-weight: 600;
            letter-spacing: 0.5px; text-transform: uppercase; margin-top: 10px; cursor: pointer;
        }
        .container button.hidden { background-color: transparent; border-color: #fff; }

        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .loader { width: 32px; height: 90px; border-bottom: 10px solid #FF3D00; background-color: #FFF; border-radius: 50% 50% 0 0; animation: animloaderBack 1s linear infinite alternate; }
        @keyframes animloaderBack { 0%, 30%, 70% { transform: translateY(0px); } 20%, 40%, 100% { transform: translateY(-5px); } }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="preloader"><span class="loader"></span></div>

<div class="container" id="container">
    <div class="form-container sign-up">
        <form onsubmit="return false;">
            <h1>Create Account</h1>
            <div class="social-icons">
                <a class="google-btn">
                    <i class="fa-brands fa-google"></i>
                    <span>Sign in with Google</span>
                </a>
            </div>
            <span>Use Google to sign up</span>
        </form>
    </div>
    <div class="form-container sign-in">
        <form onsubmit="return false;">
            <h1>Sign In</h1>
            <div class="social-icons">
                <a class="google-btn">
                    <i class="fa-brands fa-google"></i>
                    <span>Sign in with Google</span>
                </a>
            </div>
            <span>Use Google to sign in</span>
        </form>
    </div>
    <div class="toggle-container">
        <div class="toggle">
            <div class="toggle-panel toggle-left">
                <h1>Welcome Back!</h1>
                <button class="hidden" id="loginBtn">Sign In</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Hello, Friend!</h1>
                <button class="hidden" id="registerBtn">Sign Up</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDXV7NvAwwKcZioIKfQMZLSRzAFGsDpO-s",
        authDomain: "reflux-4e31c.firebaseapp.com",
        projectId: "reflux-4e31c",
        storageBucket: "reflux-4e31c.firebasestorage.app",
        messagingSenderId: "1068794188425",
        appId: "1:1068794188425:web:5b5f300589c2a3f99bac58"
    };


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.emailjs.init("GalYmxhKEgEvYsaA-");
  

    async function handleAuth() {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            await window.emailjs.send("reflux_0pxm73d", "template_o3l8sl6", {
                to_name: user.displayName,
                to_email: user.email,
                message: `Hey ${user.displayName}, you just logged in to RFlux 🚀`
            });

            localStorage.setItem("user", JSON.stringify({
                name: user.displayName,
                email: user.email,
                photo: user.photoURL
            }));

            const redirectPage = localStorage.getItem("redirectAfterLogin");
            localStorage.removeItem("redirectAfterLogin");

            window.location.href = redirectPage || "index.html";

        } catch (error) {
            console.error("FULL ERROR:", error);
            alert("Error: " + (error.text || JSON.stringify(error)));
        }
    }

    document.querySelectorAll('.google-btn').forEach(btn => btn.addEventListener('click', handleAuth));
</script>

<script>
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stars = [];
    for (let i = 0; i < 150; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            baseX: Math.random() * canvas.width,
            baseY: Math.random() * canvas.height
        });
    }

    window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Apply Parallax effect
        let dx = (mouse.x - window.innerWidth / 2) * 0.05;
        let dy = (mouse.y - window.innerHeight / 2) * 0.05;

        stars.forEach(star => {
            ctx.beginPath();
            ctx.arc(star.baseX + dx, star.baseY + dy, star.size, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();

    // UI Toggles
    const container = document.getElementById('container');
    document.getElementById('registerBtn').addEventListener('click', () => container.classList.add("active"));
    document.getElementById('loginBtn').addEventListener('click', () => container.classList.remove("active"));

    // Preloader
    window.addEventListener("load", () => {
        setTimeout(() => document.getElementById("preloader").style.display = "none", 1000);
    });
</script>

</body>
</html>
